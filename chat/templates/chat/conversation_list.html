{% extends "chat/base_chat.html" %}

{% block title %}Chat{% endblock %}

{% block header_content %}
<span class="text-sm font-medium text-gray-400">Select a chat or start a new one</span>
{% endblock %}

{% block chat_content %}
<div class="flex flex-col items-center justify-center flex-1 gap-4 text-center px-4">
  <div class="w-12 h-12 rounded-full flex items-center justify-center" style="background-color: #40414f;">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z"/>
    </svg>
  </div>
  <div>
    <h2 class="text-base font-semibold text-white">How can I help you today?</h2>
    <p class="text-sm text-gray-400 mt-1">Start a new chat using the button in the sidebar.</p>
  </div>
  <form method="post" action="{% url 'chat:create' %}">
    {% csrf_token %}
    <button type="submit"
            class="px-4 py-2 text-white text-sm rounded-lg border border-white/20 hover:bg-white/10 transition-colors">
      New Chat
    </button>
  </form>
</div>
{% endblock %}
