<div id="knowledge-add-form"
     class="rounded-xl border border-blue-700/40 p-5 space-y-4"
     style="background-color: #202123;"
     x-data="{ tab: 'upload' }">

  <div class="flex items-center justify-between">
    <h2 class="text-sm font-semibold text-white">Add Document</h2>
    <button type="button"
      onclick="document.getElementById('add-form-slot').innerHTML = ''"
      class="text-xs text-gray-500 hover:text-gray-300 transition-colors">✕ Cancel</button>
  </div>

  {# Tab selector #}
  <div class="flex rounded-lg border border-white/10 overflow-hidden text-xs">
    <button @click="tab = 'upload'"
            :class="tab === 'upload' ? 'bg-white/10 text-white' : 'text-gray-400 hover:text-white'"
            class="px-3 py-1.5 transition-colors" type="button">Upload File</button>
    <button @click="tab = 'url'"
            :class="tab === 'url' ? 'bg-white/10 text-white' : 'text-gray-400 hover:text-white'"
            class="px-3 py-1.5 transition-colors" type="button">From URL</button>
    <button @click="tab = 'text'"
            :class="tab === 'text' ? 'bg-white/10 text-white' : 'text-gray-400 hover:text-white'"
            class="px-3 py-1.5 transition-colors" type="button">Paste Text</button>
  </div>

  <div id="knowledge-form-error"></div>

  {# Upload form #}
  <form x-show="tab === 'upload'"
        hx-post="{% url 'agent:knowledge-add' %}"
        hx-target="#knowledge-form-error"
        hx-swap="innerHTML"
        hx-encoding="multipart/form-data"
        class="space-y-3">
    {% csrf_token %}
    <input type="hidden" name="source_type" value="upload">
    <div>
      <label class="block text-xs text-gray-400 mb-1">Title <span class="text-gray-600">(optional, defaults to filename)</span></label>
      <input type="text" name="title" placeholder="e.g. API Reference Guide"
             class="w-full px-3 py-2 rounded-lg border border-white/10 bg-black/20 text-white text-sm focus:outline-none focus:border-blue-500/60">
    </div>
    <div>
      <label class="block text-xs text-gray-400 mb-1">File <span class="text-red-400">*</span></label>
      <input type="file" name="file" accept=".md,.txt,.pdf"
             class="w-full text-sm text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border file:border-white/10 file:bg-white/5 file:text-gray-300 file:text-xs hover:file:bg-white/10">
      <p class="text-xs text-gray-600 mt-1">Supported: .md, .txt, .pdf</p>
    </div>
    <button type="submit"
            class="text-sm px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-500 transition-colors">
      Upload &amp; Ingest
    </button>
  </form>

  {# URL form #}
  <form x-show="tab === 'url'"
        hx-post="{% url 'agent:knowledge-add' %}"
        hx-target="#knowledge-form-error"
        hx-swap="innerHTML"
        class="space-y-3">
    {% csrf_token %}
    <input type="hidden" name="source_type" value="url">
    <div>
      <label class="block text-xs text-gray-400 mb-1">Title <span class="text-gray-600">(optional, defaults to URL slug)</span></label>
      <input type="text" name="title" placeholder="e.g. Django Documentation"
             class="w-full px-3 py-2 rounded-lg border border-white/10 bg-black/20 text-white text-sm focus:outline-none focus:border-blue-500/60">
    </div>
    <div>
      <label class="block text-xs text-gray-400 mb-1">URL <span class="text-red-400">*</span></label>
      <input type="url" name="source_url" required placeholder="https://example.com/docs/guide"
             class="w-full px-3 py-2 rounded-lg border border-white/10 bg-black/20 text-white text-sm font-mono focus:outline-none focus:border-blue-500/60">
    </div>
    <button type="submit"
            class="text-sm px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-500 transition-colors">
      Fetch &amp; Ingest
    </button>
  </form>

  {# Paste text form #}
  <form x-show="tab === 'text'"
        hx-post="{% url 'agent:knowledge-add' %}"
        hx-target="#knowledge-form-error"
        hx-swap="innerHTML"
        class="space-y-3">
    {% csrf_token %}
    <input type="hidden" name="source_type" value="text">
    <div>
      <label class="block text-xs text-gray-400 mb-1">Title <span class="text-red-400">*</span></label>
      <input type="text" name="title" required placeholder="e.g. Internal Runbook"
             class="w-full px-3 py-2 rounded-lg border border-white/10 bg-black/20 text-white text-sm focus:outline-none focus:border-blue-500/60">
    </div>
    <div>
      <label class="block text-xs text-gray-400 mb-1">Content <span class="text-red-400">*</span></label>
      <textarea name="raw_content" rows="10" required
                placeholder="Paste your document text here…"
                class="w-full px-3 py-2 rounded-lg border border-white/10 bg-black/20 text-white text-sm font-mono focus:outline-none focus:border-blue-500/60 resize-y"></textarea>
    </div>
    <button type="submit"
            class="text-sm px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-500 transition-colors">
      Save &amp; Ingest
    </button>
  </form>

</div>
