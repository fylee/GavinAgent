name: joke-report
description: Daily report with current time, a random joke, and a character frequency bar chart
agent: default
enabled: true
delivery: announce

trigger:
  cron: "22 17 * * *"
  timezone: Asia/Taipei

steps:
  - name: joke-and-time
    prompt: >
      Report the current date and time in Asia/Taipei timezone.
      Then fetch a random joke from https://official-joke-api.appspot.com/random_joke
      using the web_fetch tool and include the full joke (setup and punchline).
      Format your response as:

      ## Daily Report

      **Time:** <current date and time>

      **Joke:** <setup> ... <punchline>

  - name: character-chart
    prompt: >
      Take the joke text from the previous step output (the setup and punchline combined).
      Count the frequency of every English letter (a-z, case-insensitive, letters only).
      Then use the chart tool to produce a horizontal bar chart titled
      "Letter Frequency in Today's Joke" with the letter counts.
      Append the chart to the previous step output and return the complete report.
